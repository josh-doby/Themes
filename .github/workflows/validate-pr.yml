name: Validate themes (PR)

on:
  pull_request:
    paths:
      - 'themes/**'
      - 'scripts/validate-themes.mjs'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate all theme files
        run: node scripts/validate-themes.mjs
