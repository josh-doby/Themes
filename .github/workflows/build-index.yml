name: Build index

on:
  push:
    branches: [main]
    paths:
      - 'themes/**'
      - 'scripts/generate-index.mjs'
      - 'scripts/validate-themes.mjs'

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate themes
        run: node scripts/validate-themes.mjs
      - name: Regenerate index.json
        run: node scripts/generate-index.mjs
      - name: Commit index.json if changed
        run: |
          if [[ -n "$(git status --porcelain index.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.json
            git commit -m "chore: regenerate index.json"
            git push
          else
            echo "index.json already up to date."
          fi
